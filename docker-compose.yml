services:
  mongodb:
    image: mongo:7.0
    container_name: eval-pipeline-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-evaladmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-evalpass123}
      MONGO_INITDB_DATABASE: eval_pipeline
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: eval-pipeline-kafka
    ports:
      - "9094:9094"   # external access from host
    environment:
      # KRaft mode — no Zookeeper needed
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eval-pipeline-app
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-evaladmin}:${MONGO_PASSWORD:-evalpass123}@mongodb:27017/eval_pipeline?authSource=admin
      MONGO_DB_NAME: ${MONGO_DB_NAME:-eval_pipeline}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092   # internal docker network listener
      KAFKA_TOPIC_CONVERSATIONS: ${KAFKA_TOPIC_CONVERSATIONS:-conversations.raw}
      KAFKA_TOPIC_FEEDBACK: ${KAFKA_TOPIC_FEEDBACK:-feedback.raw}
      KAFKA_TOPIC_EVALUATIONS: ${KAFKA_TOPIC_EVALUATIONS:-evaluations.trigger}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-eval-pipeline-consumers}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./src:/app/src   # hot-reload in dev
    restart: unless-stopped

volumes:
  mongo_data:
  kafka_data:
